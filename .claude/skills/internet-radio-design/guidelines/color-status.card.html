<!-- @dsCard group="Colors" viewport="700x160" name="Status & Text" subtitle="Live green, favorite rose, danger red, and the text ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--fg); }
  .wrap { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 96px; height: 48px; border-radius: var(--radius-lg); }
  .name { font-size: 11px; font-weight: 600; }
  .val { font-size: 10px; color: var(--fg-3); }
  .ramp { display: flex; gap: 18px; align-items: baseline; }
  .ramp span { font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--live)"></div><div class="name">--live</div><div class="val">#34d399</div></div>
      <div class="sw"><div class="chip" style="background:var(--fav)"></div><div class="name">--fav</div><div class="val">#fb7185</div></div>
      <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="name">--danger</div><div class="val">#ef4444</div></div>
      <div class="ramp">
        <span style="color:var(--fg)">fg 100</span>
        <span style="color:var(--fg-2)">fg-2 55</span>
        <span style="color:var(--fg-3)">fg-3 30</span>
        <span style="color:var(--fg-4)">fg-4 20</span>
      </div>
    </div>
  </div>
</body>
</html>
