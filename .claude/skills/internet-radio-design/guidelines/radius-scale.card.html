<!-- @dsCard group="Spacing" viewport="700x140" name="Radius Scale" subtitle="Large, soft corners — pills dominate; nothing sharp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--fg); }
  .wrap { padding: 20px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 64px; height: 64px; background: var(--accent-soft); border: 1px solid var(--accent-ring); }
  .name { font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md 10</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg 12</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl 16</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="name">2xl 20</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-3xl)"></div><div class="name">3xl 24</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-4xl)"></div><div class="name">4xl 28</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-full)"></div><div class="name">full</div></div>
  </div>
</body>
</html>
