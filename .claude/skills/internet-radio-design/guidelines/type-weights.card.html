<!-- @dsCard group="Type" viewport="700x150" name="Weights & Tracking" subtitle="Inter 400–800; negative tracking on headings, wide on caps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--fg); }
  .wrap { padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 24px; align-items: baseline; flex-wrap: wrap; }
  .w { font-size: 22px; }
  .w small { display: block; font-size: 10px; color: var(--fg-3); font-weight: 500; letter-spacing: 0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <span class="w" style="font-weight:400">Regular<small>400</small></span>
      <span class="w" style="font-weight:500">Medium<small>500</small></span>
      <span class="w" style="font-weight:600">Semibold<small>600</small></span>
      <span class="w" style="font-weight:700">Bold<small>700</small></span>
      <span class="w" style="font-weight:800">Extrabold<small>800</small></span>
    </div>
    <div class="row">
      <span style="font-size:24px;font-weight:700;letter-spacing:-0.02em">Tight −0.02em</span>
      <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-2)">Widest 0.12em</span>
    </div>
  </div>
</body>
</html>
