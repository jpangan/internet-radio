<!-- @dsCard group="Type" viewport="700x180" name="Type Scale" subtitle="Inter — tight tracking on headings, dense UI text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--fg); }
  .wrap { padding: 22px 24px; display: flex; flex-direction: column; gap: 12px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .tag { font-size: 10px; color: var(--fg-3); width: 116px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">3xl · 30 · 700</span><span style="font-size:var(--text-3xl);font-weight:700;letter-spacing:var(--tracking-tight)">Stream the world</span></div>
    <div class="line"><span class="tag">2xl · 24 · 700</span><span style="font-size:var(--text-2xl);font-weight:700;letter-spacing:var(--tracking-tight)">Nothing playing</span></div>
    <div class="line"><span class="tag">base · 16 · 600</span><span style="font-size:var(--text-base);font-weight:600">Select Country</span></div>
    <div class="line"><span class="tag">sm · 14 · 500</span><span style="font-size:var(--text-sm);font-weight:500;color:var(--fg-2)">BBC Radio 6 Music · English</span></div>
    <div class="line"><span class="tag">2xs · 11 · 600</span><span style="font-size:var(--text-2xs);font-weight:600;text-transform:uppercase;letter-spacing:var(--tracking-wide);color:var(--live)">Live</span></div>
  </div>
</body>
</html>
