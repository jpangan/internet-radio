<meta charset="utf-8" />

<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--v-font); background: var(--v-bg); }
  #app { position: fixed; inset: 0; }

  /* Range inputs */
  input[type="range"] { -webkit-appearance: none; appearance: none; background: var(--v-elev-3); border-radius: 999px; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--v-accent); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border: none; border-radius: 50%; background: var(--v-accent); }
  .v-range-light { background: rgba(255,255,255,0.28) !important; }
  .v-range-light::-webkit-slider-thumb { background: #fff !important; }
  .v-range-light::-moz-range-thumb { background: #fff !important; }

  .v-shelf { scrollbar-width: none; }
  .v-shelf::-webkit-scrollbar { display: none; }
  .v-fab:active { transform: scale(0.92); }
  .v-link:hover { color: var(--v-fg) !important; }
  @media (max-width: 600px) { .v-only-wide { display: none !important; } }
  @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.001ms !important; } }
</style>
