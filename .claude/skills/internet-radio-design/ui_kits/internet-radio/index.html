<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Internet Radio</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #050509; }
  body {
    font-family: var(--font-sans);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: var(--fg);
  }
  /* Phone frame for the card preview; on a real device the app just fills the viewport. */
  #frame {
    width: 430px; height: 740px; max-width: 100vw; max-height: 100vh;
    overflow: hidden; position: relative;
    border-radius: 0;
  }
  @media (min-width: 480px) {
    #frame {
      border-radius: 28px;
      box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
    }
  }
  #app { height: 100%; }
  input[type="range"] { -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.12); border-radius: 999px; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border: none; border-radius: 50%; background: var(--accent); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
</head>
<body>
  <div id="frame"><div id="app"></div></div>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="PlayerView.jsx"></script>
  <script type="text/babel" src="Sheet.jsx"></script>
  <script type="text/babel" src="BrowseSheet.jsx"></script>
  <script type="text/babel" src="FavoritesSheet.jsx"></script>
  <script type="text/babel" src="ShareSheet.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
