<!-- @dsCard group="Components" viewport="700x340" name="Core — Buttons, Badges, Tags, Input" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); color: var(--fg);
    background: var(--bg) var(--gradient-bg-glow); }
  #root { padding: 26px; display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .lab { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--fg-3); margin-bottom: 10px; }
  .block { }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Badge, Tag, IconButton, SearchInput } = window.InternetRadioDesignSystem_7e870d;
    const Globe = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20M12 2a14.5 14.5 0 0 1 0 20M2 12h20"/></svg>);
    const Heart = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>);
    function Demo() {
      const [q, setQ] = React.useState("");
      return (
        <>
          <div className="block">
            <div className="lab">Buttons</div>
            <div className="row">
              <Button variant="primary" iconLeft={<Globe/>}>Select Country</Button>
              <Button variant="secondary">Cancel</Button>
              <Button variant="ghost" size="sm">Load more</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>
          <div className="block">
            <div className="lab">Badges &amp; Tags</div>
            <div className="row">
              <Badge tone="live">Live</Badge>
              <Badge tone="accent">Connecting…</Badge>
              <Badge tone="neutral" showDot={false}>320 kbps</Badge>
              <Tag>jazz</Tag><Tag>news</Tag><Tag accent>chillout</Tag>
            </div>
          </div>
          <div className="block">
            <div className="lab">Icon buttons &amp; Search</div>
            <div className="row">
              <IconButton label="Globe" tone="accent" size="lg"><Globe/></IconButton>
              <IconButton label="Favorite" tone="fav" active><Heart/></IconButton>
              <IconButton label="Globe" size="md"><Globe/></IconButton>
              <div style={{ width: 240 }}>
                <SearchInput value={q} onChange={(e)=>setQ(e.target.value)} placeholder="Search stations…" />
              </div>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
